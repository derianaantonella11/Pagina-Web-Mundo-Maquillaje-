<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro | Únete a GLOW Comunidad</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header class="main-header">
        <div class="logo">GLOW</div>
        <nav class="navbar">
            <a href="index.html">Inicio</a>
            <a href="categorias.html">Categorías</a>
            <a href="tutoriales.html">Tutoriales</a>
            <a href="registro.html" class="active btn-registro-nav">Registro</a>
        </nav>
    </header>

   <main class="contenedor-registro" style="flex-direction: column; gap: 2rem;">
        <section class="tarjeta-formulario">
            <h2>Crear una Cuenta</h2>
            
            <form id="formRegistro">
                <div class="grupo-formulario">
                    <label for="username">Nombre de Usuario</label>
                    <input type="text" id="username" name="username" required placeholder="Ej. MariaGlow">
                </div>

                <div class="grupo-formulario">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" name="email" required placeholder="tu@correo.com">
                </div>

                <div class="grupo-formulario">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" required placeholder="Mínimo 8 caracteres">
                </div>

                <button type="submit" class="btn-enviar-form">Registrarse Ahora</button>
            </form>
        </section>

        <section class="tabla-registros-container">
            <h3>Usuarios Registrados</h3>
            <div class="tabla-wrapper">
                <table id="tablaUsuarios">
                    <thead>
                        <tr>
                            <th>Usuario</th>
                            <th>Correo Electrónico</th>
                        </tr>
                    </thead>
                    <tbody>
                        </tbody>
                </table>
            </div>
            <button id="btnLimpiar" class="btn-limpiar">Limpiar Registros</button>
        </section>
    </main>

    <footer class="main-footer">
        <p>&copy; 2026 GLOW Elegance.</p>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('formRegistro');
            const tablaBody = document.querySelector('#tablaUsuarios tbody');
            const btnLimpiar = document.getElementById('btnLimpiar');

            // Función encargada de renderizar la lista en la interfaz
            function mostrarUsuarios() {
                const usuarios = JSON.parse(localStorage.getItem('usuariosRegistrados')) || [];
                tablaBody.innerHTML = ''; 

                if (usuarios.length === 0) {
                    tablaBody.innerHTML = `<tr><td colspan="2" style="text-align:center; color:#999;">No hay usuarios registrados aún.</td></tr>`;
                    return;
                }

                // Inyectamos dinámicamente cada fila en el árbol DOM
                usuarios.forEach(user => {
                    const fila = document.createElement('tr');
                    fila.innerHTML = `
                        <td><strong>${user.nombre}</strong></td>
                        <td>${user.correo}</td>
                    `;
                    tablaBody.appendChild(fila);
                });
            }

            // Evento al enviar el formulario (Crear Registro)
            form.addEventListener('submit', (e) => {
                e.preventDefault(); 

                const nombre = document.getElementById('username').value;
                const correo = document.getElementById('email').value;

                const nuevoUsuario = { nombre, correo };

                // Traemos los existentes, empujamos el nuevo y volvemos a guardar en LocalStorage
                const usuarios = JSON.parse(localStorage.getItem('usuariosRegistrados')) || [];
                usuarios.push(nuevoUsuario);
                localStorage.setItem('usuariosRegistrados', JSON.stringify(usuarios));

                form.reset();      
                mostrarUsuarios(); 
            });

            // Evento del botón Limpiar (Borrar Registros)
            btnLimpiar.addEventListener('click', () => {
                localStorage.removeItem('usuariosRegistrados'); 
                mostrarUsuarios(); 
            });

            
            mostrarUsuarios();
        });
    </script>
    </main>

    <footer class="main-footer">
        <p>&copy; 2026 GLOW Elegance. Diseñado bajo principios de UI/UX.</p>
    </footer>

</body>
</html>
